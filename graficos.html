<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <title>Simulador de Bolsa - Painel Histórico</title>
    <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #fff; padding: 30px; margin: 0; }
        .container { max-width: 1100px; margin: 30px auto; background: #1e1e22; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); border: 1px solid #29292e; }
        h2 { margin: 0 0 5px 0; color: #e1e1e6; font-weight: 600; }
        p { color: #7c7c8a; font-size: 14px; margin: 0 0 30px 0; }
    </style>
</head>
<body>
    <div class='container'>
        <h2>Histórico de Ações da Simulação</h2>
        <p>📊 Seleção: Clique nos nomes das empresas à direita para ocultar ou exibir as linhas no gráfico.</p>
        <canvas id='graficoBolsa'></canvas>
    </div>
    <script>
        const ctx = document.getElementById('graficoBolsa').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1'],
                datasets: [
                    {
                        label: 'TechPato',
                        data: [ 100],
                        borderColor: '#00b37e',
                        backgroundColor: 'transparent',
                        tension: 0.2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    },
                    {
                        label: 'Pizza Cósmica',
                        data: [ 100],
                        borderColor: '#f75a68',
                        backgroundColor: 'transparent',
                        tension: 0.2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    },
                    {
                        label: 'RoboFarma',
                        data: [ 100],
                        borderColor: '#4e8fe7',
                        backgroundColor: 'transparent',
                        tension: 0.2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    },
                    {
                        label: 'Mineração Lunar',
                        data: [ 100],
                        borderColor: '#ffb84d',
                        backgroundColor: 'transparent',
                        tension: 0.2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    },
                    {
                        label: 'AgroDino',
                        data: [ 100],
                        borderColor: '#9966ff',
                        backgroundColor: 'transparent',
                        tension: 0.2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    },
                    {
                        label: 'Águas de Marte',
                        data: [ 100],
                        borderColor: '#00d2df',
                        backgroundColor: 'transparent',
                        tension: 0.2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    },
                    {
                        label: 'EcoEnergia',
                        data: [ 100],
                        borderColor: '#ff79c6',
                        backgroundColor: 'transparent',
                        tension: 0.2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    },
                    {
                        label: 'MegaChip',
                        data: [ 100],
                        borderColor: '#50fa7b',
                        backgroundColor: 'transparent',
                        tension: 0.2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    },
                    {
                        label: 'FastDrone Express',
                        data: [ 100],
                        borderColor: '#ffb86c',
                        backgroundColor: 'transparent',
                        tension: 0.2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    },
                    {
                        label: 'SpaceTur',
                        data: [ 100],
                        borderColor: '#bd93f9',
                        backgroundColor: 'transparent',
                        tension: 0.2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        position: 'right',
                        align: 'center',
                        labels: {
                            color: '#e1e1e6',
                            font: { size: 13, family: 'Segoe UI' },
                            padding: 20,
                            usePointStyle: true,
                            pointStyle: 'circle'
                        }
                    }
                },
                scales: {
                    x: { grid: { color: '#29292e' }, ticks: { color: '#7c7c8a' } },
                    y: { grid: { color: '#29292e' }, ticks: { color: '#7c7c8a' } }
                }
            }
        });
    </script>
</body>
</html>
