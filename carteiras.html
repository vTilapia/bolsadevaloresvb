<!DOCTYPE html>

<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta de Carteira</title>

<script src="carteiras.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:15px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:18px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f4b400;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#f4b400;
    color:black;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #374151;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>?? Consulta de Carteira</h1>

<input
id="conta"
placeholder="Digite o n˙mero da conta">

<button onclick="pesquisar()">
Consultar
</button>

<div id="resultado"></div>

</div>

</div>

<script>

function pesquisar(){

    let conta =
        document.getElementById("conta").value;

    let resultado =
        document.getElementById("resultado");

    if(!carteiras[conta]){

        resultado.innerHTML =
        "<h3>Conta n„o encontrada</h3>";

        return;
    }

    let html =
    "<table>";

    html +=
    "<tr><th>Empresa</th><th>Quantidade</th></tr>";

    for(let empresa in carteiras[conta]){

        html +=
        "<tr>" +
        "<td>"+empresa+"</td>" +
        "<td>"+carteiras[conta][empresa]+"</td>" +
        "</tr>";

    }

    html += "</table>";

    resultado.innerHTML = html;

}

</script>

</body>
</html>
