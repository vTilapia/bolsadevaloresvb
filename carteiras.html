<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Carteira</title>

<script src="C:\Users\victo\OneDrive\Desktop\BOLSA\carteiras.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.busca{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    opacity:0.9;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:15px;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#374151;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #374151;
}

tr:hover{
    background:#2a3441;
}

.total{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>?? Minha Carteira</h1>

<div class="busca">

<input
 type="text"
 id="conta"
 placeholder="Digite o nºmero da conta">

<button onclick="consultar()">
Consultar
</button>

</div>

<div id="resultado"></div>

</div>

<script>

function consultar(){

    const conta =
        document.getElementById("conta").value.trim();

    const carteira =
        carteiras[conta];

    if(!carteira){

        document.getElementById("resultado").innerHTML =
        "<div class='card'>Conta nÐo encontrada.</div>";

        return;
    }

    let totalInvestido = 0;

    let html = "";

    html += "<div class='card'>";

    html += "<h2>Conta " + conta + "</h2>";

    html += "<div class='table-container'>";

    html += "<table>";

    html += "<tr>";
    html += "<th>Empresa</th>";
    html += "<th>Quantidade</th>";
    html += "<th>Valor Investido</th>";
    html += "</tr>";

    for(const empresa in carteira){

        const qtd =
            carteira[empresa].qtd;

        const investido =
            carteira[empresa].investido;

        totalInvestido += investido;

        html += "<tr>";

        html += "<td>" + empresa + "</td>";

        html += "<td>" + qtd + "</td>";

        html += "<td>R$ " +
            investido.toLocaleString(
                "pt-BR",
                {
                    minimumFractionDigits:2,
                    maximumFractionDigits:2
                }
            ) +
            "</td>";

        html += "</tr>";
    }

    html += "</table>";

    html += "</div>";

    html += "<div class='total'>";

    html += "Total Investido: R$ " +
        totalInvestido.toLocaleString(
            "pt-BR",
            {
                minimumFractionDigits:2,
                maximumFractionDigits:2
            }
        );

    html += "</div>";

    html += "</div>";

    document.getElementById("resultado").innerHTML =
        html;
}

document.getElementById("conta").addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        consultar();

    }

});

</script>

</body>
</html>
